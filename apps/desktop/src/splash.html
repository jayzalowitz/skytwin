<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyTwin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #09090b;
      color: #e1e4ea;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
    }
    .logo {
      font-size: 2.5rem;
      font-weight: 700;
      color: #6366f1;
      margin-bottom: 1rem;
    }
    .tagline {
      font-size: 1rem;
      color: #8b8fa3;
      margin-bottom: 2rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #2a2e3d;
      border-top: 3px solid #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1.5rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .status {
      font-size: 0.85rem;
      color: #5a5e72;
    }
    .dots::after {
      content: '';
      animation: dots 1.5s infinite;
    }
    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }
  </style>
</head>
<body>
  <div class="logo">SkyTwin</div>
  <div class="tagline">Your personal AI assistant</div>
  <div class="spinner"></div>
  <div class="status">Starting up<span class="dots"></span></div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyTwin — Your Digital Twin</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <!-- Onboarding overlay (shown on first visit) -->
  <div id="onboarding-overlay" class="onboarding-overlay" style="display: none;">
    <div class="onboarding-card">
      <div id="onboarding-content"></div>
    </div>
  </div>

  <div class="mobile-backdrop" id="mobile-backdrop"></div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>SkyTwin</h1>
      <span class="subtitle">Your Digital Twin</span>
    </div>
    <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="nav-links">
      <li><a href="#/" class="nav-link active" data-page="dashboard">Dashboard</a></li>
      <li><a href="#/approvals" class="nav-link" data-page="approvals">
        Approvals
        <span class="nav-badge" id="approval-count" style="display:none;">0</span>
      </a></li>
      <li><a href="#/decisions" class="nav-link" data-page="decisions">Decision History</a></li>
      <li><a href="#/twin" class="nav-link" data-page="twin">What I Know</a></li>
      <li><a href="#/settings" class="nav-link" data-page="settings">Settings</a></li>
    </ul>
    <div class="sidebar-footer">
      <div class="connection-status" id="connection-status">
        <span class="status-dot"></span>
        <span class="status-text">Checking...</span>
      </div>
    </div>
  </nav>

  <main class="content" id="content">
    <div class="page-header">
      <h2 id="page-title">Dashboard</h2>
      <div class="user-badge" id="user-badge"></div>
    </div>
    <div id="page-content">
      <!-- Dynamic content loaded here -->
    </div>
  </main>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
